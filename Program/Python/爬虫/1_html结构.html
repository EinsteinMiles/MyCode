<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8"/>
    <title>爬虫测试</title>
</head>
<body>
    <h1>这是一个爬虫测试页面</h1>
    <p>这是一个段落，用于测试爬虫的文本提取功能。</p>
    <a href="https://www.example.com">这是一个链接</a>
    <img src="https://www.example.com/image.jpg" alt="测试图片"/>
    <!-- 测试无序列表功能 -->
    <ul>
        <li id="l1">杭州</li>
        <li id="l2">苏州</li>
        <li id="l3">上海</li>
    </ul>
    <!-- 测试有序列表功能 -->
    <ol>
        <li id='l4' class="list4">西湖</li>
        <li>园林</li>
        <li>外滩</li>
    </ol>
    <!-- 测试表格功能 -->
    <table width="100%" height="100%" border="1">
        <!-- 测试表头功能 -->
        <tr>
            <th>表头1</th>
            <th>表头2</th>
            <th>表头3</th>
        </tr>
        <tr>
            <!-- 测试单元格功能,一个td就是一列 -->
            <td>单元格1</td>
            <td>单元格2</td>
            <td>单元格3</td>
        </tr>
        <tr>
            <td>单元格4</td>
            <td>单元格5</td>
            <td>单元格6</td>
        </tr>
    </table>
</body>
</html>
